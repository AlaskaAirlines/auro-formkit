<style>
  /* Target Playground stories to change the SVG icon color */
  [data-item-id*="--playground"] svg {
    color: rgb(255, 71, 133) !important;
  }
  
  /* Change color when the Playground story item is selected */
  [data-item-id*="--playground"][data-selected='true'] svg {
    color: white !important;
  }

</style>
