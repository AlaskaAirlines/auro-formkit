<div class="widget">
  <div class="routePicker">
    <div class="roundTrip">
      <auro-combobox layout="modernPillLeft" placeholder="Departure" required>
        <label slot="label">From</label>
        <auro-menu>
          <auro-menuoption value="Apples" id="option-0">Apples</auro-menuoption>
          <auro-menuoption value="Oranges" id="option-1">Oranges</auro-menuoption>
          <auro-menuoption value="Peaches" id="option-2">Peaches</auro-menuoption>
          <auro-menuoption value="Grapes" id="option-3">Grapes</auro-menuoption>
          <auro-menuoption value="Cherries" id="option-4">Cherries</auro-menuoption>
          <auro-menuoption static nomatch>No matching option</auro-menuoption>
        </auro-menu>
      </auro-combobox>
      <auro-combobox layout="modernPillRight" placeholder="arrival" required>
        <label slot="label">To</label>
        <auro-menu>
          <auro-menuoption value="Apples" id="option-0">Apples</auro-menuoption>
          <auro-menuoption value="Oranges" id="option-1">Oranges</auro-menuoption>
          <auro-menuoption value="Peaches" id="option-2">Peaches</auro-menuoption>
          <auro-menuoption value="Grapes" id="option-3">Grapes</auro-menuoption>
          <auro-menuoption value="Cherries" id="option-4">Cherries</auro-menuoption>
          <auro-menuoption static nomatch>No matching option</auro-menuoption>
        </auro-menu>
      </auro-combobox>
      <auro-button aria-label="round-trip-arrows" rounded iconOnly>
        <auro-icon customColor category="terminal" name="round-trip-arrows" slot="icon"></auro-icon>
      </auro-button>
    </div>
  </div>
  <auro-button aria-label="round-trip-arrows" rounded iconOnly>
    <auro-icon customColor category="terminal" name="one-way-arrow" slot="icon"></auro-icon>
  </auro-button>
</div>
