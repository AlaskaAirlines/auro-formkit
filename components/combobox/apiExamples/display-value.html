      Apples

      Oranges
      <span slot="displayValue">🍊</span>

      Peaches
      <span slot="displayValue">🍑</span>

    <auro-menuoption value="Grapes" id="option-3">

      <span slot="displayValue">🍇</span>

    <auro-menuoption value="Cherries" id="option-4">

      <span slot="displayValue">🍒</span>
