<div data-locale="ja-JP">
  <auro-datepicker>
    <span slot="ariaLabel.bib.close">Close Calendar</span>
    <span slot="bib.fullscreen.headline">data-locale ancestor</span>
    <span slot="fromLabel">Inherits ja-JP from ancestor</span>
    <span slot="bib.fullscreen.fromLabel">Pick a date</span>

    </span>
  </auro-datepicker>
</div>
