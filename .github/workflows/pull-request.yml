name: PR Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches-ignore:
      - 'rc/**'
      - 'main'

jobs:
  action:
    uses: AlaskaAirlines/auro-actions/.github/workflows/pull-request.yml@main
    with:
      demo-dir: './auro-formkit-demo'
      demo-build-command: 'npm run local-demo'
      # test:dist reads components/*/dist/, so auro-actions must run
      # additional-build-command AFTER `npm run build`. If that order
      # changes upstream, the check stops catching anything.
      additional-build-command: |
        npx playwright install chromium
        echo "::group::Bundled imports verification"
        npm run test:dist
        echo "::endgroup::"
      cache-dirs: |
        ./components/**/dist
        ./components/**/demo
        ./components/**/src/styles/**/*-css.js
        ./components/**/src/styles/**/*.css
        ./components/**/src/*Version.js
        ./components/**/node_modules
        ./node_modules
        ./node_modules/.cache/turbo
        ./custom-elements.json
        ./apps/**/node_modules
        ./apps/svelte-framework/.svelte-kit
        ~/.cache/ms-playwright
      test-matrix: |
        [
          {"name":"svelte-framework","command":"npm run test:framework:svelte"},
          {"name":"react-framework","command":"npm run test:framework:react"},
          {"name":"bibtemplate","command":"npx turbo run test --filter=@aurodesignsystem/auro-bibtemplate"},
          {"name":"checkbox","command":"npx turbo run test --filter=@aurodesignsystem/auro-checkbox"},
          {"name":"combobox","command":"npx turbo run test --filter=@aurodesignsystem/auro-combobox"},
          {"name":"counter","command":"npx turbo run test --filter=@aurodesignsystem/auro-counter"},
          {"name":"datepicker","command":"npx turbo run test --filter=@aurodesignsystem/auro-datepicker"},
          {"name":"dropdown","command":"npx turbo run test --filter=@aurodesignsystem/auro-dropdown"},
          {"name":"form","command":"npx turbo run test --filter=@aurodesignsystem/auro-form"},
          {"name":"helptext","command":"npx turbo run test --filter=@aurodesignsystem/auro-helptext"},
          {"name":"input","command":"npx turbo run test --filter=@aurodesignsystem/auro-input"},
          {"name":"layout-element","command":"npx turbo run test --filter=@aurodesignsystem/auro-layout-element"},
          {"name":"menu","command":"npx turbo run test --filter=@aurodesignsystem/auro-menu"},
          {"name":"radio","command":"npx turbo run test --filter=@aurodesignsystem/auro-radio"},
          {"name":"select","command":"npx turbo run test --filter=@aurodesignsystem/auro-select"}
        ]
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
